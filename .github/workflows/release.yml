name: Release Kovaloop CLI

on:
  push:
    branches:
      - main
    paths:
      - internal/kovaloopcli/config.go
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Test
        run: go test ./...

      - name: Build release assets
        run: ./scripts/build-release.sh

      - name: Read CLI version
        id: version
        run: |
          version="$(sed -n 's/^const CLIVersion = "\(.*\)"$/\1/p' internal/kovaloopcli/config.go)"
          if [ -z "$version" ]; then
            echo "CLIVersion not found" >&2
            exit 1
          fi
          tag="kovaloop-cli-$(printf '%s' "$version" | tr '.' '-')"
          {
            echo "version=$version"
            echo "tag=$tag"
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.version.outputs.tag }}"
          title="Kovaloop CLI ${{ steps.version.outputs.version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/kovaloop_* --clobber
          else
            gh release create "$tag" dist/kovaloop_* \
              --target "$GITHUB_SHA" \
              --title "$title" \
              --notes "Automated Kovaloop CLI release for ${{ steps.version.outputs.version }}."
          fi
